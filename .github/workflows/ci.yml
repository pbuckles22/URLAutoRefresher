# ESLint + Vitest + production build (esbuild + icons) + Playwright E2E.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint, Prettier, test, build, and E2E
        env:
          PLAYWRIGHT_HEADLESS: '1'
        run: npm run ci
